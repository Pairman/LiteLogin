#####################################################################
#
# LiteLogin configuration
# YAML reference: https://yaml.org/
# Issue tracker: https://github.com/Pairman/LiteLogin/issues
#
#####################################################################

# Enable debug logging.
debug: false

# Send a welcome message after a successful login.
welcomeMsg: true

# Require players to pass LiteLogin authentication before joining.
forceUseLogin: true

# Username validation pattern. Leave empty to disable the check.
nameAllowedRegular: '^[0-9a-zA-Z_]{3,16}$'

# Append numbers to generated profile names when the name is already taken.
nameCorrect: true

# Reclaim the old in-game name automatically after an upstream account rename.
autoNameChange: true

# Expiration time for dangerous command confirmation, in milliseconds.
confirmCommandValidTimeMills: 15000

# Expiration time for `link` requests, in milliseconds.
linkAcceptValidTimeMills: 30000

sql:
  username: root
  password: root

  # An underscore is appended automatically when building table names.
  tablePrefix: litelogin

  # Optional custom H2 JDBC URL. {0} is replaced with the database file path.
  connectUrl: ''
